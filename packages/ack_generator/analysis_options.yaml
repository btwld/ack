# Inherits the shared workspace config (lints + DCM presets/rules).
# See /analysis_options.yaml at the workspace root.
include: ../../analysis_options.yaml

analyzer:
  errors:
    # Suppress deprecated analyzer API warnings while we maintain compatibility.
    deprecated_member_use: ignore

linter:
  rules:
    # Generator-specific relaxations for codegen-heavy code.
    prefer_single_quotes: true
    avoid_print: false
    lines_longer_than_80_chars: false
    avoid_classes_with_only_static_members: false
