name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    uses: btwld/dart-actions/.github/workflows/publish.yml@9075ce1232ec77b8747953f2ff4a349190e5a805
    permissions:
      id-token: write
    with:
      packages_folder_path: "packages"
      packages: |
        ack
        ack_annotations
        ack_generator
        ack_json_schema_builder
        ack_firebase_ai
